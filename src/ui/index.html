<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Wiki</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --link: #58a6ff;
      --accent: #238636;
      --danger: #f85149;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 20px;
    }

    .nav a, .nav button {
      color: var(--text-muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .nav a:hover, .nav button:hover {
      color: var(--link);
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 10px 15px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--link);
    }

    .search-box button {
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    .tenant-select {
      margin-bottom: 20px;
    }

    .tenant-select select {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }

    .main-content {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 20px;
    }

    .sidebar {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
    }

    .sidebar h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .namespace-list {
      list-style: none;
    }

    .namespace-list li {
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .namespace-list li:hover {
      background: var(--bg);
    }

    .namespace-list li.active {
      background: var(--bg);
      color: var(--link);
    }

    .content-area {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      min-height: 500px;
    }

    .document-list {
      list-style: none;
    }

    .document-list li {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }

    .document-list li:last-child {
      border-bottom: none;
    }

    .document-list h4 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .document-list h4 a {
      color: var(--link);
      text-decoration: none;
    }

    .document-list h4 a:hover {
      text-decoration: underline;
    }

    .document-list .meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .document-list .preview {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .document-view {
      display: none;
    }

    .document-view.active {
      display: block;
    }

    .document-view h2 {
      margin-bottom: 10px;
    }

    .document-view .meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .document-view .content {
      font-size: 15px;
      line-height: 1.8;
    }

    .document-view .content pre {
      background: var(--bg);
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
    }

    .document-view .content code {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 13px;
    }

    .backlinks {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .backlinks h4 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .backlinks ul {
      list-style: none;
    }

    .backlinks li {
      padding: 5px 0;
    }

    .backlinks a {
      color: var(--link);
      text-decoration: none;
    }

    .search-results {
      display: none;
    }

    .search-results.active {
      display: block;
    }

    .search-results h3 {
      margin-bottom: 15px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .similarity-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      border-radius: 10px;
      font-size: 11px;
      margin-left: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Wiki</h1>
      <nav class="nav">
        <button onclick="showDocuments()">Documents</button>
        <button onclick="showRecent()">Recent</button>
      </nav>
    </header>

    <div class="tenant-select">
      <select id="tenantSelect" onchange="loadTenant()">
        <option value="">Select a tenant...</option>
      </select>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search documents..." onkeypress="if(event.key==='Enter')search()">
      <button onclick="search()">Search</button>
    </div>

    <div class="main-content">
      <aside class="sidebar">
        <h3>Namespaces</h3>
        <ul class="namespace-list" id="namespaceList">
          <li class="active" onclick="selectNamespace(null)">All</li>
        </ul>
      </aside>

      <main class="content-area">
        <div id="loading" class="loading">Loading...</div>

        <div id="documentList" class="document-list-container">
          <ul class="document-list" id="documents"></ul>
        </div>

        <div id="searchResults" class="search-results">
          <h3>Search Results</h3>
          <ul class="document-list" id="searchResultsList"></ul>
        </div>

        <div id="documentView" class="document-view">
          <button onclick="showDocuments()" style="margin-bottom: 15px; color: var(--link); background: none; border: none; cursor: pointer;">← Back to list</button>
          <h2 id="docTitle"></h2>
          <div class="meta" id="docMeta"></div>
          <div class="content" id="docContent"></div>
          <div class="backlinks" id="docBacklinks"></div>
        </div>

        <div id="empty" class="empty" style="display: none;">No documents found.</div>
      </main>
    </div>
  </div>

  <script>
    const API_BASE = '/api/v1';
    let currentTenant = null;
    let currentNamespace = null;

    async function init() {
      // Load tenants
      const res = await fetch(`${API_BASE}/tenants`);
      const data = await res.json();

      const select = document.getElementById('tenantSelect');
      data.tenants.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.slug;
        opt.textContent = t.name;
        select.appendChild(opt);
      });

      if (data.tenants.length > 0) {
        select.value = data.tenants[0].slug;
        await loadTenant();
      }
    }

    async function loadTenant() {
      const slug = document.getElementById('tenantSelect').value;
      if (!slug) return;

      currentTenant = slug;
      currentNamespace = null;

      // Load namespaces
      const res = await fetch(`${API_BASE}/tenants/${slug}/namespaces`);
      const data = await res.json();

      const list = document.getElementById('namespaceList');
      list.innerHTML = '<li class="active" onclick="selectNamespace(null)">All</li>';

      data.namespaces.forEach(ns => {
        const li = document.createElement('li');
        li.textContent = ns.name;
        li.onclick = () => selectNamespace(ns.slug);
        list.appendChild(li);
      });

      await loadDocuments();
    }

    async function selectNamespace(ns) {
      currentNamespace = ns;

      document.querySelectorAll('.namespace-list li').forEach(li => {
        li.classList.remove('active');
      });
      event.target.classList.add('active');

      await loadDocuments();
    }

    async function loadDocuments() {
      if (!currentTenant) return;

      showLoading();

      let url = `${API_BASE}/tenants/${currentTenant}/documents?limit=50`;
      if (currentNamespace) {
        url += `&namespace=${currentNamespace}`;
      }

      const res = await fetch(url);
      const data = await res.json();

      hideLoading();
      renderDocuments(data.documents);
    }

    async function showRecent() {
      if (!currentTenant) return;

      showLoading();

      const res = await fetch(`${API_BASE}/tenants/${currentTenant}/documents?orderBy=updated_at&orderDir=desc&limit=20`);
      const data = await res.json();

      hideLoading();
      renderDocuments(data.documents);
    }

    function renderDocuments(docs) {
      const list = document.getElementById('documents');
      const empty = document.getElementById('empty');

      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('documentView').classList.remove('active');
      document.getElementById('documentList').style.display = 'block';

      if (docs.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = docs.map(doc => `
        <li>
          <h4><a href="#" onclick="viewDocument('${doc.slug}'); return false;">${escapeHtml(doc.title)}</a></h4>
          <div class="meta">
            ${doc.sourceType ? `Source: ${doc.sourceType} • ` : ''}
            Updated: ${new Date(doc.updatedAt).toLocaleDateString()}
          </div>
          <div class="preview">${escapeHtml(doc.content.substring(0, 200))}...</div>
        </li>
      `).join('');
    }

    async function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query || !currentTenant) return;

      showLoading();

      try {
        const res = await fetch(`${API_BASE}/tenants/${currentTenant}/documents/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, namespace: currentNamespace })
        });
        const data = await res.json();

        hideLoading();
        renderSearchResults(data.results);
      } catch (e) {
        hideLoading();
        alert('Search failed. Make sure the API is running.');
      }
    }

    function renderSearchResults(results) {
      document.getElementById('documentList').style.display = 'none';
      document.getElementById('documentView').classList.remove('active');
      document.getElementById('searchResults').classList.add('active');

      const list = document.getElementById('searchResultsList');

      if (results.length === 0) {
        list.innerHTML = '<li class="empty">No results found.</li>';
        return;
      }

      list.innerHTML = results.map(r => `
        <li>
          <h4>
            <a href="#" onclick="viewDocument('${r.document.slug}'); return false;">${escapeHtml(r.document.title)}</a>
            <span class="similarity-badge">${(r.similarity * 100).toFixed(0)}%</span>
          </h4>
          <div class="meta">Updated: ${new Date(r.document.updatedAt).toLocaleDateString()}</div>
          <div class="preview">${escapeHtml(r.document.content.substring(0, 200))}...</div>
        </li>
      `).join('');
    }

    async function viewDocument(slug) {
      if (!currentTenant) return;

      showLoading();

      const [docRes, backlinksRes] = await Promise.all([
        fetch(`${API_BASE}/tenants/${currentTenant}/documents/${slug}`),
        fetch(`${API_BASE}/tenants/${currentTenant}/documents/${slug}/backlinks`)
      ]);

      const doc = await docRes.json();
      const backlinksData = await backlinksRes.json();

      hideLoading();

      document.getElementById('documentList').style.display = 'none';
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('documentView').classList.add('active');

      document.getElementById('docTitle').textContent = doc.title;
      document.getElementById('docMeta').innerHTML = `
        <strong>Slug:</strong> ${doc.slug}<br>
        <strong>Created:</strong> ${new Date(doc.createdAt).toLocaleString()}<br>
        <strong>Updated:</strong> ${new Date(doc.updatedAt).toLocaleString()}
        ${doc.sourceType ? `<br><strong>Source:</strong> ${doc.sourceType}` : ''}
      `;
      document.getElementById('docContent').innerHTML = marked ? marked.parse(doc.content) : doc.content.replace(/\n/g, '<br>');

      const backlinks = backlinksData.backlinks || [];
      const backlinksEl = document.getElementById('docBacklinks');
      if (backlinks.length > 0) {
        backlinksEl.innerHTML = `
          <h4>Backlinks (${backlinks.length})</h4>
          <ul>
            ${backlinks.map(bl => `<li><a href="#" onclick="viewDocument('${bl.documentSlug}'); return false;">${escapeHtml(bl.documentTitle)}</a> [${bl.linkType}]</li>`).join('')}
          </ul>
        `;
      } else {
        backlinksEl.innerHTML = '';
      }
    }

    function showDocuments() {
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('documentView').classList.remove('active');
      document.getElementById('documentList').style.display = 'block';
      loadDocuments();
    }

    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('documentList').style.display = 'none';
      document.getElementById('empty').style.display = 'none';
    }

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load marked.js for markdown rendering
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    document.head.appendChild(script);

    init();
  </script>
</body>
</html>
