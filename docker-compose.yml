services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-wiki-db
    environment:
      POSTGRES_USER: aiwiki
      POSTGRES_PASSWORD: aiwiki_dev
      POSTGRES_DB: aiwiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwiki -d aiwiki"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
